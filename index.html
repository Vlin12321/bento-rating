<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍱 便當評分系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html { font-size: 18px; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0fdf4; }
  .score-badge { font-variant-numeric: tabular-nums; }
  .score-high { background: #dcfce7; color: #166534; }
  .score-mid  { background: #fef9c3; color: #854d0e; }
  .score-low  { background: #fee2e2; color: #991b1b; }
  .card { transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .tab-btn.active { border-bottom: 2px solid #16a34a; color: #16a34a; }
  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  .today-glow { box-shadow: 0 0 0 3px #86efac, 0 4px 20px rgba(134,239,172,0.35); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease; }
</style>
</head>
<body>

<!-- Header -->
<header class="bg-white border-b border-green-100 sticky top-0 z-50 shadow-sm">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-2">
    <span class="text-2xl">🍱</span>
    <span class="font-bold text-gray-800 text-lg">便當評分</span>
    <span id="todayBadge" class="hidden text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium"></span>
    <span id="demoBadge" class="hidden text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-medium">⚠️ 示範模式</span>
    <div class="flex flex-col items-end gap-0.5 ml-auto">
      <span id="appVersion" class="text-[10px] text-gray-300 leading-none"></span>
      <div class="flex items-center gap-1 bg-gray-100 rounded-lg p-0.5">
        <button id="viewRatingBtn" onclick="setViewMode('rating')" class="text-xs px-2.5 py-1 rounded-md font-medium transition-colors bg-white text-green-700 shadow-sm">評價</button>
        <button id="viewMenuBtn" onclick="setViewMode('menu')" class="text-xs px-2.5 py-1 rounded-md font-medium transition-colors text-gray-500">菜單</button>
      </div>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-6">

  <!-- 今日便當區 -->
  <section id="todaySection" class="hidden mb-6">
    <div class="flex items-center gap-2 mb-3">
      <span class="text-lg">☀️</span>
      <h2 class="font-bold text-gray-800 text-base">今日便當</h2>
      <span id="todayDate" class="text-xs text-gray-500"></span>
    </div>
    <div id="todayCards"></div>
  </section>

  <!-- 昨日便當區 -->
  <section id="yesterdaySection" class="hidden mb-8">
    <div class="flex items-center gap-2 mb-3">
      <span class="text-lg">🌙</span>
      <h2 class="font-bold text-gray-800 text-base">昨日便當</h2>
      <span id="yesterdayDate" class="text-xs text-gray-500"></span>
    </div>
    <div id="yesterdayCards"></div>
  </section>

  <!-- 所有店家 -->
  <section>
    <div class="flex items-center gap-2 mb-3 flex-wrap">
      <span class="text-lg">🏪</span>
      <h2 class="font-bold text-gray-800 text-base">所有店家</h2>
      <span id="storeCount" class="text-xs text-gray-500"></span>
      <div class="flex items-center gap-2 ml-auto">
        <input id="searchInput" type="text" placeholder="搜尋店家..."
          class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 w-36 focus:outline-none focus:border-green-500">
        <select id="sortSelect" class="text-sm border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-green-500 bg-white">
          <option id="sortByDate" value="date">依日期</option>
          <option value="avg">依均分</option>
          <option value="count">依評價數</option>
          <option value="name">依店名</option>
        </select>
      </div>
    </div>
    <div id="storeList" class="space-y-2"></div>
  </section>

  <!-- 載入中 -->
  <div id="loading" class="text-center py-20 text-gray-400">
    <div class="text-4xl mb-3">🍱</div>
    <div>載入中...</div>
  </div>

</main>

<!-- 查看評價 Modal -->
<div id="reviewsModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 px-4 pb-4 sm:pb-0">
  <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl fade-in max-h-[80vh] flex flex-col">
    <div class="flex items-center justify-between px-5 py-4 border-b shrink-0">
      <div>
        <h3 id="reviewsModalTitle" class="font-bold text-gray-800"></h3>
        <p id="reviewsModalDate" class="text-xs text-gray-400 mt-0.5"></p>
      </div>
      <button onclick="closeReviewsModal()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
    </div>
    <div id="reviewsModalBody" class="overflow-y-auto px-5 py-3 space-y-3"></div>
  </div>
</div>

<!-- 評分 Modal -->
<div id="ratingModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4">
  <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl fade-in">
    <div class="flex items-center justify-between px-5 py-3 border-b">
      <div>
        <h3 class="font-bold text-gray-800">✏️ 留下評分</h3>
        <div id="modalStoreName" class="text-sm text-gray-500 mt-0.5"></div>
      </div>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
    </div>
    <div class="px-5 py-4 grid grid-cols-2 gap-x-6 gap-y-3">

      <!-- 左欄 -->
      <div class="space-y-3">
        <div>
          <label class="text-sm font-semibold text-gray-600 mb-1 block">暱稱</label>
          <input id="inputRater" type="text" maxlength="7"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500">
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-600 mb-1 block">選擇餐點 <span class="text-red-400">*</span></label>
          <select id="inputDish" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500 bg-white">
            <option value="">選擇餐點...</option>
          </select>
          <input id="inputDishCustom" type="text" maxlength="10" placeholder="或手動輸入..."
            class="w-full mt-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500">
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-600 mb-1 block">配菜（選填）</label>
          <input id="inputSides" type="text" maxlength="30" placeholder="高麗菜、水煮蛋..."
            oninput="syncSideChips()"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500">
          <div id="sideChips" class="flex flex-wrap gap-1.5 mt-1.5"></div>
        </div>
      </div>

      <!-- 右欄 -->
      <div class="space-y-3 flex flex-col">
        <div>
          <label class="text-sm font-semibold text-gray-600 mb-1 block">
            分數：<span id="scoreDisplay" class="text-green-600 font-bold text-base">8</span> / 10
          </label>
          <input type="hidden" id="inputScore" value="8">
          <div id="starRating" class="py-1"></div>
        </div>
        <div class="flex-1">
          <label class="text-sm font-semibold text-gray-600 mb-1 block">評語（選填）</label>
          <textarea id="inputComment" rows="3" maxlength="100" placeholder="簡單說說..."
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500 resize-none"></textarea>
        </div>
        <div>
          <button id="submitBtn" onclick="submitRating()"
            class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-xl transition-colors">
            送出評分
          </button>
          <p id="submitMsg" class="hidden text-center text-sm text-green-600 font-medium mt-2">✅ 已送出！謝謝評分</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ─── 設定 ───────────────────────────────────────────────────
const APP_VERSION = '1.3.1';
document.getElementById('appVersion').textContent = 'v' + APP_VERSION;
const API_URL = 'https://script.google.com/macros/s/AKfycbxaNDdd5OEsrFx0FLrJcMfBEcGhYdKXUa8QOoleLZHFxIrI03bN6BgRtqb5fPAjSZ-hYA/exec';
const DEMO_MODE = new URLSearchParams(location.search).has('demo') || API_URL.startsWith('YOUR_');
if (DEMO_MODE) document.getElementById('demoBadge').classList.remove('hidden');

const DEMO_STORES = [
  { name: '945香古早味排肉飯麵', avg: 9.0, count: 3, reviews: [
    { date: '2026/04/28', rater: '七七', dish: '燒肉牛排炒飯 180', sides: '', score: 9, comment: '炒飯跟牛肉都蠻好吃的' },
    { date: '2026/04/15', rater: '品蓉', dish: '排骨飯 120', sides: '高麗菜、荷包蛋', score: 9, comment: '排骨很香' },
    { date: '2026/03/20', rater: '妞妞', dish: '魯肉飯 80', sides: '', score: 9, comment: '古早味十足' }
  ]},
  { name: '馬西獸餐盒', avg: 8.8, count: 5, reviews: [
    { date: '2026/04/28', rater: '七七', dish: '打拋豬 120', sides: '櫛瓜、地瓜、高麗菜', score: 9, comment: '蔬菜調味剛好，打拋豬味道也挺好但偏油' },
    { date: '2026/04/10', rater: '涵歆', dish: '泰式打拋雞 110', sides: '炒蛋、高麗菜', score: 8, comment: '醬汁很香' }
  ]},
  { name: '雞肉本家', avg: 8.5, count: 2, reviews: [
    { date: '2026/05/07', rater: '品蓉', dish: '好吃雞肉飯 125', sides: '高麗菜、水煮蛋、滷豆腐', score: 8, comment: '雞肉類似白斬雞，好吃' },
    { date: '2026/04/20', rater: '映琪', dish: '獅子頭雞肉飯 165', sides: '', score: 9, comment: '雞肉很嫩很好吃' }
  ]},
  { name: 'JABABA呷八霸便當', avg: 7.5, count: 2, reviews: [
    { date: '2026/05/11', rater: '七七', dish: '銷魂炸排骨 120', sides: '油豆腐、高麗菜', score: 8, comment: '青菜調味、炸排骨很厚味道都挺好' }
  ]},
  { name: '凰子餐禾手作餐盒', avg: 3.0, count: 1, reviews: [
    { date: '2026/05/12', rater: '七七', dish: '剝皮辣椒雞個人鍋 160', sides: '高麗菜、菇類', score: 3, comment: '沒有剝皮辣椒的味道、有點清淡' }
  ]}
];
const DEMO_MENU = {
  '945香古早味排肉飯麵': ['燒肉牛排炒飯 180', '排骨飯 120', '魯肉飯 80', '雞腿飯 130'],
  '馬西獸餐盒': ['打拋豬 120', '泰式打拋雞 110', '月亮蝦餅便當 150'],
  '雞肉本家': ['好吃雞肉飯 125', '獅子頭雞肉飯 165', '親子丼 140'],
  'JABABA呷八霸便當': ['銷魂炸排骨 120', '紅燒獅子頭 130'],
  '凰子餐禾手作餐盒': ['剝皮辣椒雞個人鍋 160', '麻油雞湯鍋 180']
};
const DEMO_TODAY = {
  '午餐': { '雞肉本家': ['好吃雞肉飯 125', '獅子頭雞肉飯 165'], 'JABABA呷八霸便當': ['銷魂炸排骨 120'], '一米粒': ['鹽水雞飯 110'] },
  '晚餐': { '馬西獸餐盒': ['打拋豬 120', '泰式打拋雞 110'], '諾艾榭歐風精緻餐盒': ['義式燉牛 160'] },
  '茶湯會': { '茶湯會': ['觀音拿鐵(微糖微冰)', '翡翠檸檬(微糖去冰)', '四季春(無糖微冰)'] },
  '點心': { '天使雞排': ['椒鹽', '麻辣', '原味'] },
};

// ─── 狀態 ───────────────────────────────────────────────────
let allStores = [];
let menuData = {};
let currentStore = null;
let _dayDishes = {}; // key: normalizeName(store)+'|'+dateStr
let viewMode = 'rating'; // 'rating' | 'menu'
let _hasTodayData = false;
let _hasYesterdayData = false;

// ─── 初始化 ─────────────────────────────────────────────────
async function init() {
  const today = getToday();
  const yesterday = getBusinessYesterday(today);
  document.getElementById('todayDate').textContent = today;
  document.getElementById('yesterdayDate').textContent = yesterday;

  const [stores, todayData, yesterdayData, menu] = DEMO_MODE
    ? [DEMO_STORES, { groups: DEMO_TODAY }, { groups: {} }, DEMO_MENU]
    : await Promise.all([
        apiFetch('getStores'),
        apiFetch('getTodayStores', { date: today }),
        apiFetch('getTodayStores', { date: yesterday }),
        apiFetch('getMenu')
      ]);

  allStores = mergeStores(stores || []);
  menuData = menu || {};

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('storeCount').textContent = `${allStores.length} 間`;

  function toGroups(data) {
    if (!data) return {};
    if (data.groups) return data.groups;
    if (data.stores) return { '': data.stores };
    return {};
  }

  const todayGroups = toGroups(todayData);
  const yesterdayGroups = toGroups(yesterdayData);

  _hasTodayData = Object.values(todayGroups).some(g => Object.keys(g).length > 0);
  _hasYesterdayData = Object.values(yesterdayGroups).some(g => Object.keys(g).length > 0);

  if (_hasTodayData) {
    renderDaySection('today', todayGroups, today);
  }
  if (_hasYesterdayData) {
    renderDaySection('yesterday', yesterdayGroups, yesterday);
  }

  filterStores();
  document.getElementById('searchInput').addEventListener('input', filterStores);
  document.getElementById('sortSelect').addEventListener('change', filterStores);
}

// ─── 今日 / 昨日便當 ────────────────────────────────────────
function buildDayCard(store, dishes, dateStr, isToday) {
  _dayDishes[normalizeName(store) + '|' + dateStr] = dishes;
  const key = normalizeName(store);
  const storeData = allStores.find(s => normalizeName(s.name) === key);
  const avg = storeData ? storeData.avg : null;
  const count = storeData ? storeData.count : 0;
  const dayReviews = storeData ? storeData.reviews.filter(r => r.date === dateStr) : [];

  const glowClass = isToday ? 'today-glow' : 'border-2 border-gray-200';
  const card = document.createElement('div');
  card.className = `bg-white rounded-xl p-4 ${glowClass}`;
  const chipBase = isToday
    ? 'bg-green-50 hover:bg-green-100 text-green-700 border border-green-200'
    : 'bg-gray-50 hover:bg-gray-100 text-gray-600 border border-gray-200';
  const otherChip = isToday
    ? 'bg-green-500 hover:bg-green-600 text-white'
    : 'bg-gray-400 hover:bg-gray-500 text-white';

  card.innerHTML = `
    <div class="mb-2">
      <div class="font-semibold text-gray-800">${store}</div>
      ${avg !== null
        ? `<div class="mt-1 flex items-center gap-1.5">
            ${scoreBadge(avg)}
            <button data-store="${esc(store)}" onclick="event.preventDefault();showReviewsModal(this.dataset.store)" class="text-xs text-green-500 hover:underline">${count} 則評價</button>
           </div>`
        : '<div class="text-xs text-gray-400 mt-0.5">尚無評分</div>'}
    </div>
    <div class="flex flex-wrap gap-1.5">
      ${dishes.map(d => `<button data-store="${esc(store)}" data-date="${dateStr}" data-dish="${esc(d)}"
        onclick="event.preventDefault();openModal(this.dataset.store,this.dataset.date,this.dataset.dish)"
        class="text-xs ${chipBase} px-2.5 py-1 rounded-full transition-colors">${d}</button>`).join('')}
      <button data-store="${esc(store)}" data-date="${dateStr}"
        onclick="event.preventDefault();openModal(this.dataset.store,this.dataset.date,'其他')"
        class="text-xs ${otherChip} px-2.5 py-1 rounded-full transition-colors font-medium">＋ 其他</button>
    </div>
    ${dayReviews.length ? `
      <div class="border-t border-gray-100 mt-2 pt-2 space-y-1">
        ${dayReviews.map(r => `
          <div class="flex items-start gap-2 text-xs">
            <div class="shrink-0 text-gray-600 whitespace-nowrap">${r.dish}</div>
            <div class="flex-1 text-gray-600 min-w-0">${r.comment || ''}</div>
            <div class="flex items-center gap-1.5 shrink-0 w-32 border-l border-gray-100 pl-2">
              <span class="inline-flex justify-center w-8 shrink-0">${r.score !== null ? scoreBadge(r.score) : ''}</span>
              <span class="text-gray-600 truncate">${r.rater||'匿名'}</span>
            </div>
          </div>`).join('')}
      </div>` : ''}`;
  return card;
}

function renderDaySection(day, groups, dateStr) {
  const isToday = day === 'today';
  const sec = document.getElementById(isToday ? 'todaySection' : 'yesterdaySection');
  const container = document.getElementById(isToday ? 'todayCards' : 'yesterdayCards');
  const badge = document.getElementById('todayBadge');

  sec.classList.remove('hidden');
  container.innerHTML = '';

  const allCount = Object.values(groups).reduce((s, g) => s + Object.keys(g).length, 0);
  if (isToday) {
    badge.classList.remove('hidden');
    badge.textContent = `今日 ${allCount} 間`;
  }

  const MAIN_MEALS = ['午餐', '晚餐'];
  const hasMealTypes = MAIN_MEALS.some(m => groups[m] && Object.keys(groups[m]).length > 0);

  if (!hasMealTypes) {
    // Flat layout (old data / no meal type)
    const flatStores = Object.values(groups).reduce((acc, g) => Object.assign(acc, g), {});
    const grid = document.createElement('div');
    grid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3';
    for (const [store, dishes] of Object.entries(flatStores)) {
      grid.appendChild(buildDayCard(store, dishes, dateStr, isToday));
    }
    container.appendChild(grid);
    return;
  }

  // Build up to 3 columns: 午餐, 晚餐, 飲料+點心(合併)
  const cols = [];
  for (const meal of MAIN_MEALS) {
    if (groups[meal] && Object.keys(groups[meal]).length) cols.push({ label: meal, stores: groups[meal] });
  }
  const otherEntries = [];
  for (const [type, stores] of Object.entries(groups)) {
    if (!MAIN_MEALS.includes(type) && Object.keys(stores).length) otherEntries.push([type, stores]);
  }
  if (otherEntries.length) {
    cols.push({ label: otherEntries.map(([t]) => t).join(' / '), groups: otherEntries });
  }

  const GRID_COLS = ['', 'grid-cols-1', 'grid-cols-2', 'grid-cols-3'];
  const grid = document.createElement('div');
  grid.className = `grid ${GRID_COLS[Math.min(cols.length, 3)] || 'grid-cols-3'} gap-4 items-start`;

  const ICONS = { '午餐': '☀️', '晚餐': '🌙' };
  const getIcon = l => ICONS[l] || (l.includes('點心') || l.includes('雞排') ? '🍟' : '🥤');

  for (const col of cols) {
    const colEl = document.createElement('div');
    const lp = document.createElement('p');
    lp.className = 'text-sm font-semibold text-gray-500 mb-2';
    lp.textContent = `${getIcon(col.label)} ${col.label}`;
    colEl.appendChild(lp);
    const stack = document.createElement('div');
    stack.className = 'space-y-3';
    const groupList = col.stores ? [[null, col.stores]] : col.groups;
    for (const [, stores] of groupList) {
      for (const [store, dishes] of Object.entries(stores)) {
        stack.appendChild(buildDayCard(store, dishes, dateStr, isToday));
      }
    }
    colEl.appendChild(stack);
    grid.appendChild(colEl);
  }
  container.appendChild(grid);
}

// ─── 店家清單 ───────────────────────────────────────────────
function renderStoreList(stores) {
  const container = document.getElementById('storeList');
  container.innerHTML = '';

  if (!stores.length) {
    container.innerHTML = '<div class="text-center py-10 text-gray-400">找不到店家</div>';
    return;
  }

  stores.forEach(store => {
    const item = document.createElement('div');
    item.className = 'bg-white rounded-xl card overflow-hidden';
    item.innerHTML = `
      <div class="flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-3 min-w-0">
          <div class="font-medium text-gray-800">${store.name}</div>
          <span class="text-xs text-gray-400 shrink-0">${store.count} 則評價</span>
        </div>
        <div class="flex items-center gap-2 shrink-0 ml-2">
          ${scoreBadge(store.avg)}
        </div>
      </div>
      <div class="border-t border-gray-100">
        ${renderStoreDetail(store)}
      </div>`;
    container.appendChild(item);
  });
}

function renderStoreDetail(store) {
  const reviewsHtml = store.reviews.length
    ? store.reviews.map(r => `
        <div class="py-2 border-b border-gray-50 last:border-0">
          <div class="flex items-start justify-between gap-2">
            <div class="flex-1 min-w-0">
              <span class="text-sm font-medium text-gray-700">${r.dish}</span>
              ${r.sides ? `<span class="text-sm text-gray-500 ml-1">/ ${r.sides}</span>` : ''}
              ${r.comment ? `<div class="text-xs text-gray-600 mt-0.5">${r.comment}</div>` : ''}
            </div>
            <div class="shrink-0 w-28 flex flex-col items-start gap-0.5 border-l border-gray-100 pl-3">
              <div class="flex items-center gap-1.5">
                <span class="inline-flex justify-center w-8 shrink-0">${r.score !== null ? scoreBadge(r.score) : ''}</span>
                <span class="text-xs text-gray-600 truncate">${r.rater || '匿名'}</span>
              </div>
              <span class="text-xs text-gray-400 whitespace-nowrap">${r.date}</span>
            </div>
          </div>
        </div>`).join('')
    : '<div class="text-sm text-gray-400 py-2">尚無評價</div>';

  return `
    <div class="px-4 py-3">
      ${reviewsHtml}
      <button onclick="openModal('${esc(store.name)}')"
        class="mt-3 w-full text-sm text-green-600 border border-green-200 hover:bg-green-50 rounded-lg py-1.5 transition-colors font-medium">
        + 我要評分
      </button>
    </div>`;
}

// ─── 評價 / 菜單 檢視切換 ───────────────────────────────────
function setViewMode(mode) {
  viewMode = mode;
  const isMenu = mode === 'menu';

  document.getElementById('viewRatingBtn').className =
    `text-xs px-2.5 py-1 rounded-md font-medium transition-colors ${!isMenu ? 'bg-white text-green-700 shadow-sm' : 'text-gray-500'}`;
  document.getElementById('viewMenuBtn').className =
    `text-xs px-2.5 py-1 rounded-md font-medium transition-colors ${isMenu ? 'bg-white text-green-700 shadow-sm' : 'text-gray-500'}`;

  document.getElementById('todaySection').classList.toggle('hidden', isMenu || !_hasTodayData);
  document.getElementById('yesterdaySection').classList.toggle('hidden', isMenu || !_hasYesterdayData);

  const sortSelect = document.getElementById('sortSelect');
  document.getElementById('sortByDate').classList.toggle('hidden', isMenu);
  if (isMenu && sortSelect.value === 'date') sortSelect.value = 'name';

  filterStores();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ─── 搜尋 & 排序 ────────────────────────────────────────────
function filterStores() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let filtered = allStores.filter(s => s.name.toLowerCase().includes(q));

  if (sort === 'date') filtered.sort((a,b) => (b.latestDate||'').localeCompare(a.latestDate||''));
  else if (sort === 'avg') filtered.sort((a,b) => b.avg - a.avg);
  else if (sort === 'count') filtered.sort((a,b) => b.count - a.count);
  else filtered.sort((a,b) => a.name.localeCompare(b.name, 'zh-TW'));

  document.getElementById('storeCount').textContent = `${filtered.length} 間`;
  if (viewMode === 'menu') renderStoreListMenu(filtered);
  else renderStoreList(filtered);
}

// ─── 菜單檢視：店名 + 總分 + 菜單品項（不顯示個別評論）──────
function renderStoreListMenu(stores) {
  const container = document.getElementById('storeList');
  container.innerHTML = '';

  if (!stores.length) {
    container.innerHTML = '<div class="text-center py-10 text-gray-400">找不到店家</div>';
    return;
  }

  stores.forEach(store => {
    const menuKey = Object.keys(menuData).find(k => normalizeName(k) === normalizeName(store.name));
    const dishes = menuKey
      ? [...new Set((menuData[menuKey] || []).map(normalizeMenuDish).filter(Boolean))]
      : [];

    const item = document.createElement('div');
    item.className = 'bg-white rounded-xl card px-4 py-3';
    item.innerHTML = `
      <div class="flex items-center justify-between gap-2 mb-2">
        <div class="font-medium text-gray-800">${store.name}</div>
        ${store.avg !== null
          ? `<button data-store="${esc(store.name)}" onclick="event.preventDefault();showReviewsModal(this.dataset.store)"
              class="flex items-center gap-1.5 shrink-0">
              ${scoreBadge(store.avg)}<span class="text-xs text-green-600 hover:underline">${store.count} 則評價</span>
             </button>`
          : '<span class="text-xs text-gray-400 shrink-0">尚無評分</span>'}
      </div>
      <div class="flex flex-wrap gap-1.5">
        ${dishes.length
          ? dishes.map(d => `<span class="text-xs bg-gray-50 text-gray-600 border border-gray-200 px-2.5 py-1 rounded-full">${d}</span>`).join('')
          : '<span class="text-xs text-gray-400">尚無菜單資料</span>'}
      </div>`;
    container.appendChild(item);
  });
}

// ─── 暱稱自動產生 ────────────────────────────────────────────
function getDefaultNickname() {
  const saved = localStorage.getItem('bentoRater');
  if (saved) return saved;
  const adj  = ['吃貨', '大胃王', '美食家', '挑嘴', '快樂', '飢餓', '幸福', '滿足', '貪吃', '挑食'];
  const noun = ['熊貓', '柴犬', '貓咪', '兔子', '倉鼠', '狐狸', '浣熊', '企鵝', '海豹', '水獺'];
  const num  = Math.floor(Math.random() * 90) + 10; // 10–99
  const nick = adj[Math.floor(Math.random() * adj.length)] + noun[Math.floor(Math.random() * noun.length)] + num;
  localStorage.setItem('bentoRater', nick);
  return nick;
}

// ─── 配菜快選 ────────────────────────────────────────────────
const COMMON_SIDES = ['高麗菜', '水煮蛋', '荷包蛋', '豆腐', '地瓜', '滷蛋', '玉米', '海帶', '花椰菜', '炒青菜'];

function renderSideChips() {
  const container = document.getElementById('sideChips');
  const selected = getSidesSet();
  container.innerHTML = COMMON_SIDES.map(s => {
    const on = selected.has(s);
    const cls = on
      ? 'text-xs px-2.5 py-1 rounded-full cursor-pointer transition-colors bg-green-600 text-white select-none'
      : 'text-xs px-2.5 py-1 rounded-full cursor-pointer transition-colors bg-green-50 text-green-700 border border-green-200 select-none';
    return `<span class="${cls}" onclick="toggleSide('${s}')">${s}</span>`;
  }).join('');
}

function getSidesSet() {
  return new Set(document.getElementById('inputSides').value.split('、').map(s => s.trim()).filter(Boolean));
}

function toggleSide(side) {
  const set = getSidesSet();
  set.has(side) ? set.delete(side) : set.add(side);
  document.getElementById('inputSides').value = [...set].join('、');
  renderSideChips();
}

function syncSideChips() { renderSideChips(); }

// ─── 評分 Modal ─────────────────────────────────────────────
function openModal(storeName, dateStr, preselectedDish) {
  currentStore = storeName;
  document.getElementById('modalStoreName').textContent = storeName;
  document.getElementById('inputScore').value = '8';
  document.getElementById('scoreDisplay').textContent = '8';
  document.getElementById('inputRater').value = localStorage.getItem('bentoRater') || '';
  document.getElementById('inputComment').value = '';
  document.getElementById('inputSides').value = '';
  document.getElementById('inputDishCustom').value = '';
  document.getElementById('submitMsg').classList.add('hidden');
  renderSideChips();

  // 優先用當日菜單，否則用全部菜單；過濾飯量備註
  const dishSelect = document.getElementById('inputDish');
  dishSelect.innerHTML = '<option value="">選擇餐點...</option>';
  const dayKey = normalizeName(storeName) + '|' + (dateStr || '');
  const rawDishes = _dayDishes[dayKey] || menuData[storeName] || [];
  const dishes = [...new Set(rawDishes.map(normalizeMenuDish).filter(Boolean))];
  dishes.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d;
    dishSelect.appendChild(opt);
  });

  renderStars(8);

  // Pre-select dish if passed from chip
  if (preselectedDish && preselectedDish !== '其他') {
    const opts = Array.from(dishSelect.options);
    const match = opts.find(o => normalizeMenuDish(o.value) === normalizeMenuDish(preselectedDish));
    if (match) dishSelect.value = match.value;
    else document.getElementById('inputDishCustom').value = preselectedDish;
  } else if (preselectedDish === '其他') {
    setTimeout(() => document.getElementById('inputDishCustom').focus(), 150);
  }

  document.getElementById('ratingModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('ratingModal').classList.add('hidden');
  document.body.style.overflow = '';
}

async function submitRating() {
  const dish = document.getElementById('inputDish').value || document.getElementById('inputDishCustom').value.trim();
  if (!dish) { alert('請選擇或輸入餐點名稱'); return; }

  let rater = document.getElementById('inputRater').value.trim();
  if (!rater) rater = getDefaultNickname();
  else localStorage.setItem('bentoRater', rater);

  const payload = {
    action: 'addRating',
    store: currentStore,
    dish,
    rater,
    sides: document.getElementById('inputSides').value.trim(),
    score: parseFloat(document.getElementById('inputScore').value),
    comment: document.getElementById('inputComment').value.trim()
  };

  const btn = document.querySelector('#ratingModal button[onclick="submitRating()"]') || document.getElementById('submitBtn');
  btn.textContent = '送出中...';
  btn.disabled = true;

  try {
    if (!DEMO_MODE) await apiPost(payload);
    document.getElementById('submitMsg').classList.remove('hidden');
    btn.textContent = '✅ 已送出';
    setTimeout(() => {
      closeModal();
      btn.textContent = '送出評分';
      btn.disabled = false;
      init(); // 重新載入資料
    }, 1500);
  } catch {
    alert('送出失敗，請稍後再試');
    btn.textContent = '送出評分';
    btn.disabled = false;
  }
}

// ─── Tab 切換 ───────────────────────────────────────────────
function switchTab(btn, showId, hideId) {
  const parent = btn.closest('.tab-btn')?.parentElement || btn.parentElement;
  parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(showId).classList.remove('hidden');
  document.getElementById(hideId).classList.add('hidden');
}

// ─── API 呼叫 ───────────────────────────────────────────────
async function apiFetch(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${API_URL}?${qs}`);
  return res.json();
}

async function apiPost(data) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(data)
  });
  return res.json();
}

// ─── 工具 ───────────────────────────────────────────────────
function getToday() {
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// 台灣國定假日（可逐年更新）
const TW_HOLIDAYS = new Set([
  '2026/01/01','2026/01/28','2026/01/29','2026/01/30','2026/01/31',
  '2026/02/01','2026/02/02','2026/02/28','2026/04/03','2026/04/04',
  '2026/05/01','2026/05/31','2026/09/26','2026/10/10'
]);

function getBusinessYesterday(todayStr) {
  const parts = todayStr.split('/');
  const d = new Date(+parts[0], +parts[1]-1, +parts[2]);
  do {
    d.setDate(d.getDate() - 1);
  } while (d.getDay() === 0 || d.getDay() === 6 ||
           TW_HOLIDAYS.has(`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`));
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// ─── 店家名稱正規化（合併相似名稱）────────────────────────────
// 移除 - · 空格等符號後比對，e.g. 諾艾榭-歐風精緻餐盒 ≡ 諾艾榭歐風精緻餐盒
function normalizeName(name) {
  return name.replace(/[-·・—\s　]/g, '').toLowerCase();
}

function mergeStores(stores) {
  const groups = {};
  for (const s of stores) {
    const key = normalizeName(s.name);
    if (!groups[key]) {
      groups[key] = { ...s, reviews: [...s.reviews] };
    } else {
      // 合併：保留評價數多的名字，合計評分與評價
      const g = groups[key];
      g.reviews = [...g.reviews, ...s.reviews]
        .sort((a,b) => (b.date||'').localeCompare(a.date||''));
      const scored = g.reviews.filter(r => r.score !== null);
      g.avg = scored.length
        ? Math.round(scored.reduce((sum,r)=>sum+r.score,0)/scored.length*10)/10
        : null;
      g.count = g.reviews.length;
      if (s.count > g.count) g.name = s.name; // 保留評價多的名稱
    }
  }
  // 加上最新日期供排序用
  return Object.values(groups).map(s => ({
    ...s,
    latestDate: s.reviews[0]?.date || ''
  }));
}

function scoreBadge(score) {
  const cls = score >= 8 ? 'score-high' : score >= 5 ? 'score-mid' : 'score-low';
  return `<span class="score-badge ${cls} text-xs font-bold px-2 py-0.5 rounded-md">${score}</span>`;
}

function esc(str) {
  return str.replace(/'/g,"&#39;").replace(/"/g,"&quot;");
}

// ─── 星星評分 ────────────────────────────────────────────────
function renderStars(score) {
  const container = document.getElementById('starRating');
  container.innerHTML = '';

  // Star buttons row
  const starRow = document.createElement('div');
  starRow.className = 'flex';
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = i <= score ? '★' : '☆';
    btn.className = `flex-1 text-2xl leading-none text-center transition-colors ${i <= score ? 'text-green-500' : 'text-gray-300'} hover:text-green-500`;
    btn.addEventListener('mouseenter', () => highlightStars(i));
    btn.addEventListener('mouseleave', () => renderStars(+document.getElementById('inputScore').value));
    btn.addEventListener('click', () => setScore(i));
    starRow.appendChild(btn);
  }
  container.appendChild(starRow);

  // Number row (1–10) aligned under each star
  const numRow = document.createElement('div');
  numRow.className = 'flex mt-0.5';
  for (let i = 1; i <= 10; i++) {
    const span = document.createElement('span');
    span.className = 'flex-1 text-center text-xs text-gray-300 select-none leading-none';
    span.textContent = i;
    numRow.appendChild(span);
  }
  container.appendChild(numRow);

  // Hint labels under 1, 5, 10
  const hints = { 1: '難吃', 5: '普通', 10: '好吃' };
  const hintRow = document.createElement('div');
  hintRow.className = 'flex mt-0.5';
  for (let i = 1; i <= 10; i++) {
    const span = document.createElement('span');
    span.className = `flex-1 text-center text-xs select-none leading-none whitespace-nowrap ${hints[i] ? 'text-gray-400' : ''}`;
    span.textContent = hints[i] || '';
    hintRow.appendChild(span);
  }
  container.appendChild(hintRow);
}

function highlightStars(n) {
  document.getElementById('starRating').querySelectorAll('button').forEach((b, i) => {
    b.textContent = i < n ? '★' : '☆';
    b.className = `flex-1 text-2xl leading-none text-center transition-colors ${i < n ? 'text-green-500' : 'text-gray-300'} hover:text-green-500`;
  });
}

function setScore(n) {
  document.getElementById('inputScore').value = n;
  document.getElementById('scoreDisplay').textContent = n;
  renderStars(n);
}

// ─── 菜單正規化（移除飯量備註）────────────────────────────────
function normalizeMenuDish(dish) {
  return dish.replace(/[\s　]*(半飯|去飯|少飯|多飯|全飯|正常飯|不要飯|少量飯|半份飯|去飯量)/g, '').trim();
}

// ─── 查看評價 Modal ──────────────────────────────────────────
function showReviewsModal(storeName) {
  const key = normalizeName(storeName);
  const store = allStores.find(s => normalizeName(s.name) === key);
  const reviews = store ? store.reviews : [];

  document.getElementById('reviewsModalTitle').textContent = storeName;
  document.getElementById('reviewsModalDate').textContent = `全部評價（${reviews.length} 則）`;

  const body = document.getElementById('reviewsModalBody');
  if (!reviews.length) {
    body.innerHTML = '<div class="text-center py-8 text-gray-400">尚無評價記錄</div>';
  } else {
    body.innerHTML = reviews.map((r, idx) => `
      <div class="py-2 border-b border-gray-100 last:border-0">
        <div class="flex items-start justify-between gap-2">
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-gray-700">${r.dish}</div>
            ${r.sides ? `<div class="text-sm text-gray-500">${r.sides}</div>` : ''}
            ${r.comment ? `<div class="text-xs text-gray-600 mt-0.5">${r.comment}</div>` : ''}
          </div>
          <div class="shrink-0 w-28 flex flex-col items-start gap-0.5 border-l border-gray-100 pl-3">
            <div class="flex items-center gap-1.5">
              <span class="inline-flex justify-center w-8 shrink-0">${r.score !== null ? scoreBadge(r.score) : ''}</span>
              <span class="text-xs text-gray-600 truncate">${r.rater || '匿名'}</span>
            </div>
            <div class="flex items-center gap-1 mt-0.5">
              <span class="text-xs text-gray-400 whitespace-nowrap">${r.date}</span>
              <button data-idx="${idx}" data-store="${esc(storeName)}"
                onclick="event.preventDefault();deleteRating(+this.dataset.idx,this.dataset.store)"
                class="text-xs text-gray-300 hover:text-red-400 transition-colors">🗑</button>
            </div>
          </div>
        </div>
      </div>`).join('');
  }

  body._reviews = reviews;

  document.getElementById('reviewsModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeReviewsModal() {
  document.getElementById('reviewsModal').classList.add('hidden');
  document.body.style.overflow = '';
}

async function deleteRating(idx, storeName) {
  const body = document.getElementById('reviewsModalBody');
  const r = body._reviews?.[idx];
  if (!r) return;

  const pw = prompt('請輸入管理員密碼以刪除此評價：');
  if (!pw) return;

  if (DEMO_MODE) { alert('Demo 模式無法刪除'); return; }

  try {
    const res = await apiPost({
      action: 'deleteRating',
      adminPassword: pw,
      date: r.date,
      store: storeName,
      rater: r.rater,
      dish: r.dish,
      score: r.score
    });
    if (res.success) {
      await init();
      showReviewsModal(storeName);
    } else {
      alert(res.error || '刪除失敗');
    }
  } catch {
    alert('刪除失敗，請稍後再試');
  }
}

// 點 Modal 外部關閉
document.getElementById('ratingModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('reviewsModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeReviewsModal();
});

// ─── 同步今日菜單 ────────────────────────────────────────────
async function syncMenu() {
  const btn = document.getElementById('syncBtn');
  btn.textContent = '⏳';
  btn.disabled = true;
  try {
    const result = await apiFetch('syncTodayMenu', { date: getToday() });
    if (result.success) {
      const msg = result.added > 0
        ? `✅ 同步完成，新增 ${result.added} 道菜（${result.sheets?.join('、')}）`
        : `ℹ️ 已是最新（${result.sheets?.join('、')}）`;
      alert(msg);
      await init();
    } else {
      alert(`⚠️ ${result.message || '同步失敗'}`);
    }
  } catch {
    alert('同步失敗，請稍後再試');
  }
  btn.textContent = '🔄';
  btn.disabled = false;
}

// 啟動
init();
